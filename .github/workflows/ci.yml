name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check with mypy
        run: mypy src
        continue-on-error: true # M1 阶段暂不强制

      - name: Run tests
        run: pytest

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 7

  build:
    name: Build sdist & wheel
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: pip install build

      - name: Build distributions
        run: python -m build

      - name: Verify installable
        run: |
          pip install dist/ai_rd_team-*.whl
          python -c "import ai_rd_team; print('version:', ai_rd_team.__version__)"
          python -c "from ai_rd_team import builtin_skills_dir; \
            d = builtin_skills_dir(); \
            import os; \
            files = sorted(os.listdir(d)); \
            print('builtin skills:', files); \
            assert 'python-best-practices.md' in files; \
            assert 'go-kratos-basics.md' in files; \
            assert 'vue3-basics.md' in files; \
            assert 'wxmini-basics.md' in files"
          ai-rd-team version
          ai-rd-team config preset --list

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: distributions
          path: dist/
          retention-days: 7
