# Advanced 配置 — 给特定角色注入 Go+Kratos Skills

# Bridge 超时：真实 CodeBuddy 响应 task/send_message 可能较慢
adapter:
  bridge_timeout_seconds: 300

# 注意：未显式指定的字段（display_name / persona / memory_scope / scalable 等）
# 会从 builtin_roles 的默认继承（v0.1.0a1+ 行为）
roles:
  architect:
    skills:
      - "go-kratos-basics"
      - "code-review-checklist"
  developer:
    skills:
      - "go-kratos-basics"
  reviewer:
    skills:
      - "go-kratos-basics"
      - "code-review-checklist"
  tester:
    skills:
      - "go-kratos-basics"
