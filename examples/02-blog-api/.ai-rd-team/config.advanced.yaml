# Advanced 配置 — 给特定角色注入 Go+Kratos Skills

# Bridge 超时：真实 CodeBuddy 响应 task/send_message 可能较慢
adapter:
  bridge_timeout_seconds: 300

roles:
  architect:
    skills:
      - "go-kratos-basics"
      - "code-review-checklist"
  developer:
    skills:
      - "go-kratos-basics"
    default_instances: 2
    max_instances: 3
  reviewer:
    skills:
      - "go-kratos-basics"
      - "code-review-checklist"
  tester:
    skills:
      - "go-kratos-basics"

# 其他配置沿用 Standard preset 默认值
