syntax = "proto3";

package blog.v1;

option go_package = "blog/api/blog/v1;v1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service User {
  // 注册
  rpc Register(RegisterRequest) returns (UserReply) {
    option (google.api.http) = {
      post: "/v1/users"
      body: "*"
    };
  }
  // 登录
  rpc Login(LoginRequest) returns (LoginReply) {
    option (google.api.http) = {
      post: "/v1/auth/login"
      body: "*"
    };
  }
  // 当前用户
  rpc GetMe(GetMeRequest) returns (UserReply) {
    option (google.api.http) = {
      get: "/v1/users/me"
    };
  }
}

message RegisterRequest {
  string email    = 1;
  string password = 2;
  string nickname = 3;
}

message LoginRequest {
  string email    = 1;
  string password = 2;
}

message LoginReply {
  string    token = 1;
  UserReply user  = 2;
}

message GetMeRequest {}

message UserReply {
  int64                      id         = 1;
  string                     email      = 2;
  string                     nickname   = 3;
  google.protobuf.Timestamp  created_at = 4;
}
