syntax = "proto3";

package blog.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/empty.proto";

option go_package = "blog/api/blog/v1;v1";

service PostService {
  rpc CreatePost (CreatePostRequest) returns (Post) {
    option (google.api.http) = { post: "/v1/posts" body: "*" };
  }
  rpc GetPost (GetPostRequest) returns (Post) {
    option (google.api.http) = { get: "/v1/posts/{id}" };
  }
  rpc UpdatePost (UpdatePostRequest) returns (Post) {
    option (google.api.http) = { put: "/v1/posts/{id}" body: "*" };
  }
  rpc DeletePost (DeletePostRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = { delete: "/v1/posts/{id}" };
  }
  rpc ListPosts (ListPostsRequest) returns (ListPostsReply) {
    option (google.api.http) = { get: "/v1/posts" };
  }
  rpc LikePost (LikePostRequest) returns (LikePostReply) {
    option (google.api.http) = { post: "/v1/posts/{id}/like" body: "*" };
  }
  rpc UnlikePost (UnlikePostRequest) returns (LikePostReply) {
    option (google.api.http) = { delete: "/v1/posts/{id}/like" };
  }
}

message Post {
  int64  id           = 1;
  int64  author_id    = 2;
  string title        = 3;
  string body_markdown = 4;
  repeated string tags = 5;
  int64  likes_count  = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message CreatePostRequest {
  string title          = 1;
  string body_markdown  = 2;
  repeated string tags  = 3;
}

message GetPostRequest    { int64 id = 1; }
message DeletePostRequest { int64 id = 1; }

message UpdatePostRequest {
  int64  id             = 1;
  string title          = 2;
  string body_markdown  = 3;
  repeated string tags  = 4;
}

message ListPostsRequest {
  int32  page = 1;
  int32  size = 2;
  string tag  = 3;
}

message ListPostsReply {
  repeated Post items = 1;
  int64         total = 2;
}

message LikePostRequest   { int64 id = 1; }
message UnlikePostRequest { int64 id = 1; }
message LikePostReply     { int64 likes_count = 1; }
