syntax = "proto3";

package blog.v1;

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "blog/api/blog/v1;v1";

service CommentService {
  rpc CreateComment (CreateCommentRequest) returns (Comment) {
    option (google.api.http) = { post: "/v1/posts/{post_id}/comments" body: "*" };
  }
  rpc ListComments (ListCommentsRequest) returns (ListCommentsReply) {
    option (google.api.http) = { get: "/v1/posts/{post_id}/comments" };
  }
}

message Comment {
  int64  id        = 1;
  int64  post_id   = 2;
  int64  author_id = 3;
  string content   = 4;
  google.protobuf.Timestamp created_at = 5;
}

message CreateCommentRequest {
  int64  post_id = 1;
  string content = 2;
}

message ListCommentsRequest {
  int64 post_id = 1;
  int32 page    = 2;
  int32 size    = 3;
}

message ListCommentsReply {
  repeated Comment items = 1;
  int64            total = 2;
}
