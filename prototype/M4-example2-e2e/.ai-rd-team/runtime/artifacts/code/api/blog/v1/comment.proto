syntax = "proto3";

package blog.v1;

option go_package = "blog/api/blog/v1;v1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service Comment {
  rpc Create(CreateCommentRequest) returns (CommentReply) {
    option (google.api.http) = {
      post: "/v1/posts/{post_id}/comments"
      body: "*"
    };
  }
  rpc List(ListCommentRequest) returns (ListCommentReply) {
    option (google.api.http) = {
      get: "/v1/posts/{post_id}/comments"
    };
  }
}

message CreateCommentRequest {
  int64  post_id = 1;
  string body    = 2;
}

message ListCommentRequest {
  int64 post_id = 1;
}

message ListCommentReply {
  repeated CommentReply items = 1;
}

message CommentReply {
  int64                      id         = 1;
  int64                      post_id    = 2;
  int64                      author_id  = 3;
  string                     body       = 4;
  google.protobuf.Timestamp  created_at = 5;
}
