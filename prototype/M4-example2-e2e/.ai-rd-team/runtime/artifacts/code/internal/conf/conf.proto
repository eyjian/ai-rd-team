syntax = "proto3";

package blog.internal.conf;

option go_package = "blog/internal/conf;conf";

import "google/protobuf/duration.proto";

// Bootstrap 根配置
message Bootstrap {
  Server server = 1;
  Data   data   = 2;
  Auth   auth   = 3;
}

message Server {
  message HTTP {
    string                     network = 1;
    string                     addr    = 2;
    google.protobuf.Duration   timeout = 3;
  }
  message GRPC {
    string                     network = 1;
    string                     addr    = 2;
    google.protobuf.Duration   timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver   = 1;
    string source   = 2;
    int32  max_idle = 3;
    int32  max_open = 4;
  }
  Database database = 1;
}

message Auth {
  string jwt_secret      = 1;
  int64  jwt_ttl_seconds = 2;
}
