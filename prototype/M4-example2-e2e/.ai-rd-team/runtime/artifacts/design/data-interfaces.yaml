# BlogAPI 数据 & 接口契约
# Owner: architect
# 用途：锁定 biz / data / service 层跨模块契约，供 developer_1 / developer_2 / tester 实现与校验

module: blog
go_version: "1.21"

# -----------------------------------------------------------------------------
# 1. 领域模型（biz 层）——跨层传递的纯结构体，不含 gorm tag
# -----------------------------------------------------------------------------
domain_models:
  User:
    fields:
      ID: int64
      Email: string          # lower-cased before insert
      PasswordHash: string   # bcrypt, 不对外返回
      Nickname: string
      CreatedAt: time.Time
      UpdatedAt: time.Time
  Post:
    fields:
      ID: int64
      AuthorID: int64
      Title: string
      BodyMarkdown: string
      Tags: "[]string"
      LikesCount: int64
      CreatedAt: time.Time
      UpdatedAt: time.Time
  Comment:
    fields:
      ID: int64
      PostID: int64
      AuthorID: int64
      Content: string
      CreatedAt: time.Time

# -----------------------------------------------------------------------------
# 2. Repo 接口（biz 定义，data 实现）
# -----------------------------------------------------------------------------
repos:
  UserRepo:
    file: internal/biz/user.go
    methods:
      - "Create(ctx context.Context, u *User) (*User, error)"
      - "GetByID(ctx context.Context, id int64) (*User, error)"
      - "GetByEmail(ctx context.Context, email string) (*User, error)"
  PostRepo:
    file: internal/biz/post.go
    methods:
      - "Create(ctx context.Context, p *Post) (*Post, error)"
      - "GetByID(ctx context.Context, id int64) (*Post, error)"
      - "Update(ctx context.Context, p *Post) (*Post, error)"
      - "Delete(ctx context.Context, id int64) error"
      - "List(ctx context.Context, page, size int32, tag string) ([]*Post, int64, error)"
      - "AddLike(ctx context.Context, postID, userID int64) (added bool, err error)"
      - "RemoveLike(ctx context.Context, postID, userID int64) (removed bool, err error)"
  CommentRepo:
    file: internal/biz/comment.go
    methods:
      - "Create(ctx context.Context, c *Comment) (*Comment, error)"
      - "ListByPost(ctx context.Context, postID int64, page, size int32) ([]*Comment, int64, error)"

# -----------------------------------------------------------------------------
# 3. Usecase（biz）——service 层只调这层
# -----------------------------------------------------------------------------
usecases:
  UserUsecase:
    constructor: "NewUserUsecase(repo UserRepo, auth *auth.JWTIssuer, logger log.Logger) *UserUsecase"
    methods:
      - "Register(ctx, email, password, nickname string) (*User, error)"
      - "Login(ctx, email, password string) (token string, user *User, err error)"
      - "Get(ctx, id int64) (*User, error)"
  PostUsecase:
    constructor: "NewPostUsecase(pr PostRepo, ur UserRepo, logger log.Logger) *PostUsecase"
    methods:
      - "Create(ctx, authorID int64, title, body string, tags []string) (*Post, error)"
      - "Get(ctx, id int64) (*Post, error)"
      - "Update(ctx, operatorID, postID int64, title, body string, tags []string) (*Post, error)  # 必须是作者"
      - "Delete(ctx, operatorID, postID int64) error  # 必须是作者"
      - "List(ctx, page, size int32, tag string) ([]*Post, int64, error)"
      - "Like(ctx, postID, userID int64) error       # 幂等"
      - "Unlike(ctx, postID, userID int64) error     # 幂等"
  CommentUsecase:
    constructor: "NewCommentUsecase(cr CommentRepo, pr PostRepo, logger log.Logger) *CommentUsecase"
    methods:
      - "Create(ctx, postID, authorID int64, content string) (*Comment, error)"
      - "ListByPost(ctx, postID int64, page, size int32) ([]*Comment, int64, error)"

# -----------------------------------------------------------------------------
# 4. HTTP / gRPC 接口（由 proto 生成）
# -----------------------------------------------------------------------------
http_routes:
  - method: POST
    path: /v1/users
    op: UserService.Register
    auth: none
    req: { email, password, nickname }
    resp: User
  - method: POST
    path: /v1/auth/login
    op: UserService.Login
    auth: none
    req: { email, password }
    resp: { token, user: User }
  - method: GET
    path: /v1/users/me
    op: UserService.GetMe
    auth: jwt
    resp: User
  - method: POST
    path: /v1/posts
    op: PostService.CreatePost
    auth: jwt
    req: { title, body_markdown, tags }
    resp: Post
  - method: GET
    path: /v1/posts/{id}
    op: PostService.GetPost
    auth: none
    resp: Post
  - method: GET
    path: /v1/posts
    op: PostService.ListPosts
    auth: none
    query: { page (default 1), size (default 20, max 100), tag (optional) }
    resp: { items: [Post], total }
  - method: PUT
    path: /v1/posts/{id}
    op: PostService.UpdatePost
    auth: jwt (author only)
    req: { title, body_markdown, tags }
    resp: Post
  - method: DELETE
    path: /v1/posts/{id}
    op: PostService.DeletePost
    auth: jwt (author only)
    resp: Empty
  - method: POST
    path: /v1/posts/{id}/comments
    op: CommentService.CreateComment
    auth: jwt
    req: { content }
    resp: Comment
  - method: GET
    path: /v1/posts/{id}/comments
    op: CommentService.ListComments
    auth: none
    query: { page, size }
    resp: { items: [Comment], total }
  - method: POST
    path: /v1/posts/{id}/like
    op: PostService.LikePost
    auth: jwt
    resp: { likes_count }
  - method: DELETE
    path: /v1/posts/{id}/like
    op: PostService.UnlikePost
    auth: jwt
    resp: { likes_count }

# -----------------------------------------------------------------------------
# 5. 错误契约
# -----------------------------------------------------------------------------
errors:
  - reason: USER_EMAIL_EXISTS
    http: 409
  - reason: USER_NOT_FOUND
    http: 404
  - reason: INVALID_CREDENTIALS
    http: 401
  - reason: UNAUTHORIZED
    http: 401
  - reason: FORBIDDEN
    http: 403
  - reason: POST_NOT_FOUND
    http: 404
  - reason: COMMENT_NOT_FOUND
    http: 404
  - reason: VALIDATION_FAILED
    http: 400

# -----------------------------------------------------------------------------
# 6. 配置契约
# -----------------------------------------------------------------------------
config:
  proto_message: Bootstrap
  sections:
    Server: { HTTP: { addr, timeout }, GRPC: { addr, timeout } }
    Data:   { Database: { driver, source }, LogLevel }
    Auth:   { JWTSecret, AccessTTL }

# -----------------------------------------------------------------------------
# 7. 数据库（字段 → Go 映射）
# -----------------------------------------------------------------------------
database:
  engine: postgres
  version: "15+"
  tables:
    users:
      pk: id (BIGSERIAL)
      unique: [email]
      columns: [id, email, password_hash, nickname, created_at, updated_at]
    posts:
      pk: id
      fk: { author_id: users.id }
      indexes:
        - idx_posts_author (author_id)
        - idx_posts_tags (tags USING gin)
      columns: [id, author_id, title, body_markdown, tags, likes_count, created_at, updated_at]
    comments:
      pk: id
      fk: { post_id: posts.id ON DELETE CASCADE, author_id: users.id }
      indexes:
        - idx_comments_post (post_id, created_at DESC)
      columns: [id, post_id, author_id, content, created_at]
    post_likes:
      pk: (post_id, user_id)
      fk: { post_id: posts.id ON DELETE CASCADE, user_id: users.id }
      columns: [post_id, user_id, created_at]

# -----------------------------------------------------------------------------
# 8. 测试契约（tester 落地）
# -----------------------------------------------------------------------------
tests:
  unit:
    - path: internal/biz/user_test.go
      covers: [Register, Login, Get]
    - path: internal/biz/post_test.go
      covers: [Create, Update, Delete, List, Like, Unlike]
    - path: internal/biz/comment_test.go
      covers: [Create, ListByPost]
  integration:
    - path: internal/data/post_test.go
      requires: testcontainers-go/postgres
  e2e:
    - path: tests/e2e/blog_flow_test.go
      scenario: "register → login → create post → like → comment → list → delete"
